; PlatformIO project for the tip-to-play cosplay sign.
;
; Board:  Adafruit QT Py ESP32-S3, 8 MB flash / no PSRAM  (product 5426)
;         For the 4 MB flash / 2 MB PSRAM board (5700) change `board` to
;         adafruit_qtpy_esp32s3_n4r2
;
; The espressif32 platform is pinned to the 6.x series so the Arduino-ESP32
; core stays on 2.0.x, which ESP8266Audio builds cleanly against.

[env:qtpy-esp32s3]
platform = espressif32 @ ^6.9.0
board = adafruit_qtpy_esp32s3_nopsram
framework = arduino
monitor_speed = 115200

; Native USB CDC so Serial works over the USB-C port, and so UART0's TX pad is
; freed up for the battery-voltage ADC reading.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; 1.9.x uses the legacy driver/i2s.h that matches Arduino-ESP32 core 2.0.x.
    ; 2.x requires the new i2s_std.h from core 3.x and will not compile here.
    earlephilhower/ESP8266Audio @ ^1.9.7
    adafruit/Adafruit ADXL343
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
